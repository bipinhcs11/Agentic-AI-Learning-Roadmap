# ─────────────────────────────────────────────────────────────────────────────
# AskMyDocs Pro — Nginx Reverse Proxy Configuration
#
# WHY Nginx in front of FastAPI and Streamlit?
# 1. Single entry point — one URL for the whole product (port 80)
# 2. SSL termination — Nginx handles HTTPS, backend gets plain HTTP
# 3. Static file serving — Nginx is 10x faster than Python for static files
# 4. WebSocket upgrade — required for /ws/chat streaming endpoint
# 5. Rate limiting — Nginx can limit requests before they hit Python
# 6. Load balancing — distribute traffic across multiple backend instances
#
# ROUTING:
# / and /app/* → Streamlit frontend (port 8501)
# /api/* → FastAPI backend (port 8000)
# /ws/* → FastAPI WebSocket (port 8000, with upgrade headers)
# ─────────────────────────────────────────────────────────────────────────────

events {
    # WHY 1024? Max simultaneous connections per worker.
    # For a small app, this is plenty. Scale up for high traffic.
    worker_connections 1024;
}

http {
    # Upstream blocks define the backend services.
    # WHY "upstream" and not direct IP? This enables load balancing later —
    # just add more "server" lines to distribute across multiple instances.
    upstream backend {
        server backend:8000;
        # In production with multiple backend instances:
        # server backend-1:8000;
        # server backend-2:8000;
        # server backend-3:8000;
    }

    upstream frontend {
        server frontend:8501;
    }

    # ─── HTTP Server (port 80) ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;  # Match any hostname — use your actual domain in production

        # WHY these headers? Security best practices:
        # X-Frame-Options: Prevents clickjacking (embedding your site in an iframe)
        # X-Content-Type-Options: Prevents MIME sniffing attacks
        # X-XSS-Protection: Legacy XSS filter (modern browsers use CSP instead)
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # Client body size limit for file uploads (10MB)
        client_max_body_size 10M;

        # ─── API Routes (FastAPI backend) ──────────────────────────────────────
        location /api/ {
            # Strip /api prefix when proxying to backend
            # /api/chat → /chat
            rewrite ^/api/(.*) /$1 break;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout for long AI responses
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ─── WebSocket Routes (streaming chat) ─────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;  # Required for WebSocket

            # WHY these upgrade headers? WebSocket starts as HTTP, then upgrades.
            # These headers tell Nginx to pass through the upgrade handshake.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Keep WebSocket connection alive for long chat sessions
            proxy_read_timeout 3600s;   # 1 hour timeout for WebSocket
            proxy_send_timeout 3600s;
        }

        # ─── Direct Backend Access (health, docs, metrics) ─────────────────────
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /docs {
            # FastAPI's built-in Swagger UI
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ─── Streamlit Frontend (all other routes) ──────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Streamlit uses WebSocket for hot-reloading and real-time updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
        }

        # ─── Streamlit static assets ───────────────────────────────────────────
        location /_stcore/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ─── HTTPS Server (port 443) — Add SSL cert to enable ─────────────────────
    # To enable HTTPS with Let's Encrypt:
    # 1. Install certbot: apt install certbot python3-certbot-nginx
    # 2. Run: certbot --nginx -d yourdomain.com
    # 3. Certbot will automatically configure this block
    #
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers on;
    #
    #     # ... same location blocks as above ...
    # }
}
