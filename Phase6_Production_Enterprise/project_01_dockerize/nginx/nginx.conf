# ═══════════════════════════════════════════════════════════════
# Nginx — Reverse Proxy
# Phase 6 · Production & Enterprise
# ═══════════════════════════════════════════════════════════════
#
# WHY NGINX?
#   Without nginx: users hit port 8000 (API) or 8501 (UI) directly.
#   With nginx: one entry point on port 80. Nginx routes internally.
#
#   /api/*  → FastAPI container (port 8000)
#   /*      → Streamlit UI container (port 8501)
#
#   This is how every production web app works.
# ═══════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    upstream api_backend {
        server api:8000;
    }

    upstream ui_backend {
        server ui:8501;
    }

    server {
        listen 80;
        server_name localhost;

        # API routes
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Streamlit requires WebSocket support for live updates
        location /_stcore/ {
            proxy_pass http://ui_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /stream {
            proxy_pass http://ui_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # All other traffic → UI
        location / {
            proxy_pass http://ui_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }
    }
}
