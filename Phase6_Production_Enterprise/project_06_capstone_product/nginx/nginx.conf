# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  DocuMind — Nginx Reverse Proxy Configuration                            ║
# ║  Routes:                                                                 ║
# ║    /api/  →  backend:8000   (strips /api prefix before forwarding)       ║
# ║    /      →  frontend:8501  (Streamlit with WebSocket upgrade support)   ║
# ╚══════════════════════════════════════════════════════════════════════════╝

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Allow larger uploads (documents can be up to 20 MB)
    client_max_body_size 25M;

    # Upstream definitions — service names match docker-compose.yml
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:8501;
    }

    server {
        listen 80;
        server_name _;

        # ── API proxy ──────────────────────────────────────────────
        # Strip the /api prefix so FastAPI sees clean paths
        location /api/ {
            proxy_pass         http://backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Streamlit WebSocket support ────────────────────────────
        # Streamlit uses WebSockets for its reactive UI; upgrade headers are required.
        location /_stcore/ {
            proxy_pass         http://frontend/_stcore/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
        }

        location /stream {
            proxy_pass         http://frontend/stream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ── Frontend catch-all ─────────────────────────────────────
        location / {
            proxy_pass         http://frontend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400s;
        }
    }
}
