name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - phase9-capstone-hub

jobs:
  offline-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy

      - name: Syntax check Python files
        run: |
          python - <<'PY'
          from pathlib import Path

          excluded = {".git", ".venv", "__pycache__"}
          failures = []
          for path in Path(".").rglob("*.py"):
              if any(part in excluded for part in path.parts):
                  continue
              try:
                  compile(path.read_text(encoding="utf-8"), str(path), "exec")
              except SyntaxError as exc:
                  failures.append(f"{path}:{exc.lineno}: {exc.msg}")

          if failures:
              print("\n".join(failures))
              raise SystemExit(1)
          PY

      - name: Run offline Phase 9 tests
        working-directory: Phase9_Dynamic_Agentic_RAG_MCP/capstone_enterprise_assistant_hub
        run: python -m pytest -q tests

      - name: Run offline Phase 12 Python tests
        working-directory: Phase12_Enterprise_AI_Identity_Security
        run: |
          python -m unittest discover -s module_01_identity_fundamentals -p 'test_*.py' -q
          python -m unittest discover -s module_05_agent_to_agent_trust -p 'test_*.py' -q
          python -m unittest discover -s docs -p 'test_*.py' -q
          python docs/validate_provider_mapping.py module_07_aws_bedrock_agentcore_identity/provider-mapping.json
          python docs/validate_provider_mapping.py module_08_microsoft_entra_agent_id/provider-mapping.json
          python docs/validate_provider_mapping.py module_09_google_cloud_vertex_ai_iam/provider-mapping.json

  phase12-java:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Phase 12 Spring Boot tests
        working-directory: Phase12_Enterprise_AI_Identity_Security
        run: mvn -q test
